<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menù del Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/i18next@21.6.3/i18next.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
  font-family:'Poppins', sans-serif;
  background-color:#f9f9f9;
  color:#333;
}

nav {
  position:fixed;
  top:0; left:0; width:100%;
  background-color: rgba(0,0,0,0.6);
  padding:15px 20px;
  z-index:1000;
  display:flex;
  align-items:center;
}

nav .logo img {
  height:90px;
  width:auto;
  position:absolute;
  left:20px;
  transition: transform 0.3s ease;
}

nav .logo img:hover {
  transform: scale(1.08) rotate(-2deg);
}

.hero {
  height:100vh;
  background-image:url('images/sfondodirello.JPG');
  background-size:cover;
  background-position:center;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  text-align:center;
  position:relative;
  padding-bottom:50px;
  animation: fadeHero 1s ease forwards;
}

@keyframes fadeHero {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

.promo-text {
  position:absolute;
  top:100px;
  width:100%;
  text-align:center;
  font-family:'Lora', serif;
  font-size:2rem;
  font-weight:700;
  color:#c6a75e;
  text-shadow:1px 1px 3px rgba(0,0,0,0.6);
  z-index:5;
  animation: textBounce 1s ease;
}

@keyframes textBounce {
  0% {transform:translateY(-20px);opacity:0;}
  50% {transform:translateY(10px);opacity:1;}
  100% {transform:translateY(0);}
}

.hero .btn {
  background-color: rgba(0,0,0,0.5);
  color:white;
  font-family:'Lora', serif;
  font-size:1.2rem;
  font-weight:700;
  padding:15px 30px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition: background-color 0.3s ease, transform 0.2s ease;
  margin-bottom:20px;
  z-index:2;
}

.hero .btn:hover {
  background-color: rgba(0,0,0,0.7);
  transform:translateY(-3px) scale(1.05);
}

.language-selector {
  position:fixed;
  top:20px;
  right:20px;
  z-index:1001;
  display:flex;
  align-items:center;
  cursor:pointer;
  padding:5px;
}

.language-selector span { font-size:2em; margin-right:5px; }
.arrow {
  font-size: 1.4rem;
  margin-left: 6px;
  color: #ffffff;
}

.language-dropdown {
  display:none;
  position:absolute;
  top:45px;
  right:0;
  background-color:rgba(255,255,255,0.8);
  border:1px solid #ccc;
  border-radius:5px;
  box-shadow:0 0 5px rgba(0,0,0,0.2);
  z-index:1002;
}

.language-dropdown a {
  display:block;
  padding:10px;
  text-decoration:none;
  color:#333;
  font-size:1.1em;
  transition: background-color 0.3s ease;
}

.language-dropdown a:hover { background-color: rgba(0,0,0,0.1); }

.info-section {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  background-color:#000;
  color:#fff;
  padding:60px 20px;
  text-align:center;
}

.info-box {
  flex:1 1 250px;
  margin:20px;
  padding:25px;
  border-radius:15px;
  background-color: rgba(0,0,0,0.7);
  box-shadow:0 6px 15px rgba(0,0,0,0.5);
  transition: transform 0.3s ease, background-color 0.3s ease;
  position:relative;
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);}}

.info-box:hover {
  transform:translateY(-5px);
  background-color: rgba(0,0,0,0.85);
}

.info-box i {
  font-size: 2rem;
  color: #c6a75e;
  margin-bottom: 10px;
  transform: rotate(180deg);  /* Ruota l'icona di 180 gradi */
}

.info-box h3 {
  margin-bottom:15px;
  font-family:'Lora', serif;
  font-size:1.5rem;
  font-weight:700;
  color:#c6a75e;
}

.info-box p {
  font-size:1.1rem;
  line-height:1.5;
}

.info-box a { color: #c6a75e; text-decoration: none; transition: text-decoration 0.2s ease;}
.info-box a:hover { text-decoration: underline; }

.social-icons {
  margin-top:10px;
}

.social-icons a {
  margin:0 8px;
  color:#c6a75e;
  font-size:1.5rem;
  transition: transform 0.2s ease;
}

.social-icons a:hover { transform:scale(1.2); }

footer {
  background-color:#000; /* nero */
  color:white;
  text-align:center;
  padding:30px 20px;
  position:relative;
  font-family:'Poppins', sans-serif;
  letter-spacing:0.3px;
}

#footer-text {
  margin-bottom: 8px;
  font-size: 0.95rem;
  color: #c6a75e; /* dorato per evidenziare SPI System */
}

@media (max-width:768px){
  .info-box { top:0px; }
  #footer-text {
  margin-bottom: 8px;
  font-size: 0.95rem;
  color: #c6a75e; /* dorato */
  -webkit-touch-callout: none; /* blocca copia/azioni automatiche su iOS */
  -webkit-user-select: none;
  -webkit-text-decoration: none;
  text-decoration: none; /* rimuove la sottolineatura */
}

#footer-text a {
  color: inherit;
  text-decoration: none;
}

/* Blocca la formattazione automatica di numeri (iOS/Chrome) */
footer, #footer-text {
  -webkit-text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
  .footer-line {
  border: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, #c6a75e, transparent);
  margin: 0 20px 15px;
  opacity: 0.7;
}
}
</style>
</head>
<body>

<nav>
  <div class="logo">
    <img src="images/E7FAAD49-2107-44FF-8C7F-167C8E1D017F.png" alt="Logo">
  </div>
</nav>

<div class="hero">
  <!-- Rimosso la scritta "Il tuo menù, in un QR code" -->
  <button class="btn" onclick="window.location.href='menu.html';">Visualizza Menù</button>
</div>

<div class="info-section">
  <div class="info-box" id="location-box">
    <i class="fas fa-map-marker-alt"></i>
    <h3 id="location-title">Dove ci troviamo</h3>
    <p id="location-text">
  Vico San Cristoforo, 11<br>Bari (BA)<br>
  <a href="https://maps.app.goo.gl/xd9z44bM9XkRHk2V7?g_st=ic" target="_blank">Apri su Google Maps</a>
</p>
  </div>
  <div class="info-box" id="hours-box">
    <i class="fas fa-clock"></i>
    <h3 id="hours-title">Orari di apertura</h3>
    <p id="hours-text">Martedì - Domenica: 19:00 - 01:00<br>Lunedì chiuso</p>
  </div>
 <div class="info-box" id="contact-box">
  <i class="fas fa-phone-alt"></i>
  <h3 id="contact-title">Contatti</h3>
 <p id="contact-text">Telefono: 334 2732997</p>
  </p>
  <div class="social-icons">
    <a href="https://www.instagram.com/giuseppespizzico__" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://www.tiktok.com/@._giuspi" target="_blank"><i class="fab fa-tiktok"></i></a>
    <a href="https://wa.me/3342732997" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</div>
</div>

<div class="language-selector" onclick="toggleDropdown(event)">
  <span>🇮🇹</span>
  <span class="arrow">&#8595;</span>
  <div class="language-dropdown">
    <a href="#" onclick="changeLanguage(event, 'it')">🇮🇹</a>
    <a href="#" onclick="changeLanguage(event, 'en')">🇬🇧</a>
    <a href="#" onclick="changeLanguage(event, 'es')">🇪🇸</a>
    <a href="#" onclick="changeLanguage(event, 'fr')">🇫🇷</a>
    <a href="#" onclick="changeLanguage(event, 'de')">🇩🇪</a>
  </div>
</div>

<footer>
  <hr class="footer-line">
  <p id="footer-text">
   L'arte della focaccia 2 di Francesco Dirello<br>
    P. IVA: 07628060729
  </p>
  <p>&copy; 2026 Menù L'arte della focaccia 2</p>
</footer>

<script>
// Lingue
i18next.init({
  lng: localStorage.getItem('selectedLanguage') || 'it',
  resources:{
    it:{translation:{
      "menu_button":"Visualizza Menù",
    "location_title": "Dove ci troviamo",
"location_text": "Vico San Cristoforo, 11<br>Bari (BA)<br><a href='https://maps.app.goo.gl/xd9z44bM9XkRHk2V7?g_st=ic' target='_blank'>Apri su Google Maps</a>",
"hours_title": "Orari di apertura",
"hours_text": "Martedì - Domenica: 19:00 - 01:00<br>Lunedì chiuso",
"contact_title": "Contatti",
"contact_text": "Telefono: 334 2732997"
    }},
    en:{translation:{
      "menu_button":"View Menu",
    "location_title": "Our Location",
"location_text": "Vico San Cristoforo, 11<br>Bari (BA)<br><a href='https://maps.app.goo.gl/xd9z44bM9XkRHk2V7?g_st=ic' target='_blank'>Open in Google Maps</a>",
"hours_title": "Opening Hours",
"hours_text": "Tuesday - Sunday: 19:00 - 01:00<br>Monday closed",
"contact_title": "Contacts",
"contact_text": "Phone: 334 2732997"
     
    }},
    es:{translation:{
      "menu_button":"Ver menú",
     "location_title": "Ubicación",
"location_text": "Vico San Cristoforo, 11<br>Bari (BA)<br><a href='https://maps.app.goo.gl/xd9z44bM9XkRHk2V7?g_st=ic' target='_blank'>Abrir en Google Maps</a>",
"hours_title": "Horario",
"hours_text": "Martes - Domingo: 19:00 - 01:00<br>Lunes cerrado",
"contact_title": "Contacto",
"contact_text": "Teléfono: 334 2732997"

    }},
    fr:{translation:{
      "menu_button":"Voir le menu",
"location_title": "Notre emplacement",
"location_text": "Vico San Cristoforo, 11<br>Bari (BA)<br><a href='https://maps.app.goo.gl/xd9z44bM9XkRHk2V7?g_st=ic' target='_blank'>Ouvrir sur Google Maps</a>",
"hours_title": "Horaires d'ouverture",
"hours_text": "Mardi - Dimanche: 19:00 - 01:00<br>Lundi fermé",
"contact_title": "Contacts",
"contact_text": "Téléphone: 334 2732997"
    }},
    de:{translation:{
      "menu_button":"Menü anzeigen",
"location_title": "Standort",
"location_text": "Vico San Cristoforo, 11<br>Bari (BA)<br><a href='https://maps.app.goo.gl/xd9z44bM9XkRHk2V7?g_st=ic' target='_blank'>In Google Maps öffnen</a>",
"hours_title": "Öffnungszeiten",
"hours_text": "Dienstag - Sonntag: 19:00 - 01:00<br>Montag geschlossen",
"contact_title": "Kontakt",
"contact_text": "Telefon: 334 2732997"
     
    }}
  }
}, updateTexts);



function updateTexts(){
  document.querySelector('.btn').textContent = i18next.t('menu_button');
  document.querySelector('#location-title').textContent = i18next.t('location_title');
  document.querySelector('#location-text').innerHTML = i18next.t('location_text');
  document.querySelector('#hours-title').textContent = i18next.t('hours_title');
  document.querySelector('#hours-text').innerHTML = i18next.t('hours_text');
  document.querySelector('#contact-title').textContent = i18next.t('contact_title');
  document.querySelector('#contact-text').innerHTML = i18next.t('contact_text');
  

  // Flag
  const flag = document.querySelector('.language-selector span:first-child');
  switch(i18next.language){
    case 'it': flag.textContent='🇮🇹'; break;
    case 'en': flag.textContent='🇬🇧'; break;
    case 'es': flag.textContent='🇪🇸'; break;
    case 'fr': flag.textContent='🇫🇷'; break;
    case 'de': flag.textContent='🇩🇪'; break;
  }
}

function changeLanguage(event, language){
  event.preventDefault();
  localStorage.setItem('selectedLanguage', language);
  i18next.changeLanguage(language, updateTexts);
  setTimeout(()=>document.querySelector('.language-dropdown').style.display='none',200);
}

function toggleDropdown(event){
  const dropdown=document.querySelector('.language-dropdown');
  dropdown.style.display=dropdown.style.display==='block'?'none':'block';
}
</script>

</body>
</html>
