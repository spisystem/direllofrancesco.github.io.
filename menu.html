<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menù</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/i18next@21.6.3/i18next.min.js"></script>

<style>
:root{
  --bg:#0f0f12;
  --card:#181a22;
  --accent:#c6a75e;
  --text:#f5f5f5;
  --muted:#b5b5b5;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Poppins,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-top:120px;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  z-index:1000;
}

.logo img{height:80px;}

.language-selector{cursor:pointer;position:relative;}

.language-dropdown{
  display:none;
  position:absolute;
  right:0;
  top:40px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
}

.language-dropdown a{
  display:block;
  padding:10px;
  text-decoration:none;
  color:var(--text);
}

/* MENU */
.menu{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.category{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  margin-bottom:18px;
  overflow:hidden;
}

.category-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 20px;
  cursor:pointer;
}

.category-header h2{
  color:var(--accent);
  font-size:1.3rem;
}

.toggle{transition:0.3s;}

.category.open .toggle{transform:rotate(180deg);}

/* PRODUCTS */
.products{
  max-height:0;
  overflow:hidden;
  transition:0.4s ease;
}

.category.open .products{
  max-height:1000px;
}

.product{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  border-top:1px solid var(--border);
  gap:10px;
}

.product-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.product-left img{
  width:45px;
  height:45px;
  border-radius:10px;
  object-fit:cover;
}

.product-name{
  color:var(--text);
  font-size:0.95rem;
}

.product-price{
  color:var(--accent);
  font-weight:600;
  white-space:nowrap;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  border-top:1px solid var(--border);
  color:var(--muted);
}
</style>
</head>

<body>

<nav>
  <div class="logo">
    <img src="images/logospi1.PNG">
  </div>

  <div class="language-selector" onclick="toggleDropdown()">
    🌐
    <div class="language-dropdown">
      <a href="#" onclick="changeLanguage(event,'it')">🇮🇹</a>
      <a href="#" onclick="changeLanguage(event,'en')">🇬🇧</a>
      <a href="#" onclick="changeLanguage(event,'es')">🇪🇸</a>
      <a href="#" onclick="changeLanguage(event,'fr')">🇫🇷</a>
      <a href="#" onclick="changeLanguage(event,'de')">🇩🇪</a>
    </div>
  </div>
</nav>

<div class="menu">

<!-- ROSTICCERIA -->
<div class="category open" id="rosticceria">
  <div class="category-header" onclick="toggleCategory(this)">
    <h2 id="rosticceria-title"></h2>
    <span class="toggle">⌄</span>
  </div>

  <div class="products">

    <div class="product">
      <div class="product-left">
        <img src="images/arancino.JPG">
        <span class="product-name" data-key="arancino"></span>
      </div>
      <span class="product-price">€2.00</span>
    </div>

    <div class="product">
      <span class="product-name" data-key="ruota_focaccia"></span>
      <span class="product-price">€5.00</span>
    </div>

  </div>
</div>

<!-- PANZEROTTI -->
<div class="category closed" id="panzerotti">
  <div class="category-header" onclick="toggleCategory(this)">
    <h2 id="panzerotti-title"></h2>
    <span class="toggle">⌄</span>
  </div>

  <div class="products">

    <div class="product">
      <span class="product-name" data-key="panzerotto_mozzarella_pomodoro"></span>
      <span class="product-price">€1.50</span>
    </div>

    <div class="product">
      <span class="product-name" data-key="panzerotto_gorgonzola"></span>
      <span class="product-price">€2.00</span>
    </div>

  </div>
</div>

<!-- BEVANDE -->
<div class="category closed" id="bevande">
  <div class="category-header" onclick="toggleCategory(this)">
    <h2 id="bevande-title"></h2>
    <span class="toggle">⌄</span>
  </div>

  <div class="products">

    <div class="product">
      <span class="product-name" data-key="cocacola"></span>
      <span class="product-price">€1.80</span>
    </div>

    <div class="product">
      <span class="product-name" data-key="acqua"></span>
      <span class="product-price">€1.00</span>
    </div>

  </div>
</div>

</div>

<footer>
<p id="footer-text"></p>
<p>&copy; 2026 Menù</p>
</footer>

<script>

/* i18next COMPLETO */
i18next.init({
  lng: localStorage.getItem('lang') || 'it',
  resources: {
    it:{translation:{
      footer_text:"L'arte della focaccia 2 - P. IVA: 07628060729",
      rosticceria:"Rosticceria",
      panzerotti:"Panzerotti",
      bevande:"Bevande",
      arancino:"Arancino",
      ruota_focaccia:"Ruota di focaccia",
      panzerotto_mozzarella_pomodoro:"Panzerotto mozzarella e pomodoro",
      panzerotto_gorgonzola:"Panzerotto gorgonzola",
      cocacola:"Coca-Cola",
      acqua:"Acqua"
    }},
    en:{translation:{
      footer_text:"The art of focaccia 2 - VAT: 07628060729",
      rosticceria:"Savory Food",
      panzerotti:"Panzerotti",
      bevande:"Drinks",
      arancino:"Arancino",
      ruota_focaccia:"Focaccia wheel",
      panzerotto_mozzarella_pomodoro:"Mozzarella and tomato panzerotto",
      panzerotto_gorgonzola:"Gorgonzola panzerotto",
      cocacola:"Coca-Cola",
      acqua:"Water"
    }},
    es:{translation:{
      footer_text:"El arte de la focaccia 2 - IVA: 07628060729",
      rosticceria:"Comida",
      panzerotti:"Panzerotti",
      bevande:"Bebidas",
      arancino:"Arancino",
      ruota_focaccia:"Rueda de focaccia",
      panzerotto_mozzarella_pomodoro:"Panzerotto mozzarella y tomate",
      panzerotto_gorgonzola:"Panzerotto gorgonzola",
      cocacola:"Coca-Cola",
      acqua:"Agua"
    }},
    fr:{translation:{
      footer_text:"L'art de la focaccia 2 - TVA: 07628060729",
      rosticceria:"Snack",
      panzerotti:"Panzerotti",
      bevande:"Boissons",
      arancino:"Arancino",
      ruota_focaccia:"Roue de focaccia",
      panzerotto_mozzarella_pomodoro:"Mozzarella et tomate",
      panzerotto_gorgonzola:"Gorgonzola",
      cocacola:"Coca-Cola",
      acqua:"Eau"
    }},
    de:{translation:{
      footer_text:"Die Kunst der Focaccia 2 - USt: 07628060729",
      rosticceria:"Snacks",
      panzerotti:"Panzerotti",
      bevande:"Getränke",
      arancino:"Arancino",
      ruota_focaccia:"Focaccia-Rad",
      panzerotto_mozzarella_pomodoro:"Mozzarella und Tomate",
      panzerotto_gorgonzola:"Gorgonzola",
      cocacola:"Coca-Cola",
      acqua:"Wasser"
    }}
  }
}, updateTexts);

function updateTexts(){

  document.getElementById("rosticceria-title").textContent=i18next.t("rosticceria");
  document.getElementById("panzerotti-title").textContent=i18next.t("panzerotti");
  document.getElementById("bevande-title").textContent=i18next.t("bevande");

  document.querySelectorAll("[data-key]").forEach(el=>{
    el.textContent=i18next.t(el.dataset.key);
  });

  document.getElementById("footer-text").textContent=i18next.t("footer_text");

  localStorage.setItem('lang', i18next.language);
}

/* LANG */
function changeLanguage(e,lang){
  e.preventDefault();
  i18next.changeLanguage(lang, updateTexts);
  document.querySelector(".language-dropdown").style.display="none";
}

function toggleDropdown(){
  const d=document.querySelector(".language-dropdown");
  d.style.display=d.style.display==="block"?"none":"block";
}

function toggleCategory(el){
  el.parentElement.classList.toggle("open");
  el.parentElement.classList.toggle("closed");
}

updateTexts();

</script>

</body>
</html>
